name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Mill and Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.cache/mill
            out
          key: mill-${{ hashFiles('.mill-version', 'build.mill') }}-${{ hashFiles('**/*.scala') }}
          restore-keys: |
            mill-${{ hashFiles('.mill-version', 'build.mill') }}-
            mill-

      - name: Build assembly JARs
        run: ./mill __.assembly

      - name: Run E2E tests
        # Docker (and docker compose v2) is pre-installed on ubuntu-latest.
        # Tests spin up Dapr infrastructure via Testcontainers; no dapr CLI needed.
        run: ./mill e2e.testForked

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: out/e2e/testForked.dest/
          if-no-files-found: ignore
