name: E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Mill and Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.cache/mill
            out
          key: mill-${{ hashFiles('.mill-version', 'build.mill') }}-${{ hashFiles('**/*.scala') }}
          restore-keys: |
            mill-${{ hashFiles('.mill-version', 'build.mill') }}-
            mill-

      - name: Install Dapr CLI
        uses: dapr/setup-dapr@v2

      - name: Initialize Dapr runtime
        # dapr init pulls Redis, placement, scheduler, and zipkin as Docker containers
        # and installs the daprd binary to ~/.dapr/bin.
        run: dapr init

      - name: Wait for Dapr's Redis to be ready
        run: |
          echo "Waiting for Redis to accept connections..."
          until docker exec dapr_redis redis-cli PING 2>/dev/null | grep -q PONG; do
            sleep 2
          done
          echo "Redis is ready."

      - name: Build assembly JARs
        # Pre-build all fat JARs so the test run itself doesn't need to compile.
        # This step also surfaces compilation errors before the long E2E run.
        run: ./mill __.assembly

      - name: Run E2E tests
        # dapr and daprd are on PATH via dapr/setup-dapr and dapr init.
        run: ./mill e2e.testForked

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: out/e2e/testForked.dest/
          if-no-files-found: ignore
