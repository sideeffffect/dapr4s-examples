version = "3.10.4"
runner.dialect = scala3

maxColumn = 120
indent.main = 2
indent.significant = 2

trailingCommas = always

# These files use experimental capture-checking `^{...}` return-type annotations in
# a position scalafmt's parser cannot yet handle; excluded until scalafmt gains
# nightly-Scala CC syntax support.
project.excludeFilters = [
  "13-order-service/src/orderservice/App\\.scala",
  "14-orders/src/orders/App\\.scala"
]
