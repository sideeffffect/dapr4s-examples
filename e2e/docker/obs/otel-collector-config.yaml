# Our OpenTelemetry Collector — the single funnel that unifies all three signals
# and forwards them to SigNoz:
#   - traces : received via OTLP from the Dapr sidecars (push)
#   - metrics: scraped from each daprd's Prometheus endpoint (:9090) (pull)
#   - logs   : tailed from the Docker container json logs (app + daprd stdout)
# Its own pipeline counters are exposed on :8888 and are what the E2E asserts on
# (otelcol_exporter_sent_spans / _metric_points / _log_records > 0).
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: dapr-sidecars
          scrape_interval: 10s
          static_configs:
            # daprd binds :9090 inside each app container's network namespace,
            # so it is reachable on the obs network as <app-service>:9090.
            - targets: ["orders:9090", "pricing:9090"]
  filelog:
    include:
      - /var/lib/docker/containers/*/*.log
    start_at: end
    operators:
      # 1. Unwrap the Docker json-file envelope {"log","stream","time"}: take the
      #    envelope time as the record timestamp, move the real log line into the
      #    body, keep the stream as log.iostream, and drop the envelope time. (We
      #    parse the envelope manually rather than via the `container` operator,
      #    whose built-in time parsing throws "failed to parse time" when followed by
      #    other operators in this collector version.)
      - type: json_parser
        parse_from: body
        timestamp:
          parse_from: attributes.time
          layout_type: gotime
          layout: '2006-01-02T15:04:05.999999999Z07:00'
      - type: move
        from: attributes.log
        to: body
      - type: move
        from: attributes.stream
        to: attributes["log.iostream"]
      - type: remove
        field: attributes.time
      # 2. daprd emits structured JSON logs; parse them into attributes (app_id,
      #    scope, instance, …) and derive severity from `level`. Plain-text lines
      #    (e.g. the durabletask stderr output) don't start with "{" and are left
      #    as-is.
      - type: json_parser
        if: 'body matches "^\\{"'
        parse_from: body
        parse_to: attributes
        severity:
          parse_from: attributes.level
      # 3. Promote the human-readable message to the body, then drop the fields now
      #    represented as first-class record fields so they aren't shown twice
      #    (severity vs `level`, timestamp vs `time`).
      - type: move
        if: 'attributes.msg != nil'
        from: attributes.msg
        to: body
      - type: remove
        if: 'attributes.level != nil'
        field: attributes.level
      - type: remove
        if: 'attributes.time != nil'
        field: attributes.time
      - type: remove
        if: 'attributes.type != nil'
        field: attributes.type

processors:
  batch: {}
  resourcedetection:
    detectors: [env, system]
    timeout: 2s

exporters:
  otlp/signoz:
    endpoint: signoz-otel-collector:4317
    tls:
      insecure: true

service:
  telemetry:
    metrics:
      # Expose the collector's own pipeline metrics for the E2E assertions.
      level: detailed
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [otlp/signoz]
    metrics:
      receivers: [otlp, prometheus]
      processors: [resourcedetection, batch]
      exporters: [otlp/signoz]
    logs:
      receivers: [otlp, filelog]
      processors: [resourcedetection, batch]
      exporters: [otlp/signoz]
