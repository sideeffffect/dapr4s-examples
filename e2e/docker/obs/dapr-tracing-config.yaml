# Dapr Configuration resource selected by each daprd via `-config`.
# Turns on 100% trace sampling and exports spans over OTLP/gRPC to our
# OpenTelemetry Collector, which funnels them on to SigNoz.
apiVersion: dapr.io/v1alpha1
kind: Configuration
metadata:
  name: obsconfig
spec:
  tracing:
    samplingRate: "1"
    otel:
      endpointAddress: "otel-collector:4317"
      isSecure: false
      protocol: grpc
