# Multi-service infrastructure for the 16 ZEISS-style order-fulfillment saga (Scala.js).
# JS twin of docker-compose.13-order.yml: four Node 25 app containers (order, inventory,
# payment, shipping), each with its own daprd sidecar sharing the app's network namespace.
# The order-service runs a Dapr Workflow whose activities invoke the three downstream
# services by app-id via mDNS over the shared dapr-net bridge. Workflow needs placement +
# scheduler + an actor-capable state store (statestore.yaml sets actorStateStore: true).
services:
  redis:
    image: redis:6
    networks: [dapr-net]

  placement:
    image: daprio/dapr:1.17.7
    command: ["./placement"]
    networks: [dapr-net]

  scheduler:
    image: daprio/dapr:1.17.7
    command:
      - "./scheduler"
      - "--etcd-data-dir=/tmp/etcd"
      - "--override-broadcast-host-port=scheduler:50006"
    networks: [dapr-net]

  order:
    image: node:25-bookworm-slim
    working_dir: /app
    volumes:
      - type: bind
        source: ${BUNDLE_ORDER}
        target: /app
        read_only: true
      - type: bind
        source: ${NODE_MODULES}
        target: /node_modules
        read_only: true
      - type: bind
        source: ${ESM_PKG}
        target: /package.json
        read_only: true
    command: ["node", "main.js"]
    environment:
      APP_PORT: "8080"
      DAPR_HTTP_PORT: "3500"
      DAPR_GRPC_PORT: "50001"
    ports:
      - "8080"
      - "3500"
    networks: [dapr-net]
    depends_on: [redis, placement, scheduler]

  order-dapr:
    image: daprio/dapr:1.17.7
    network_mode: "service:order"
    command:
      - "./daprd"
      - "-app-id=order-service"
      - "-app-port=8080"
      - "-dapr-http-port=3500"
      - "-dapr-grpc-port=50001"
      - "-components-path=/components"
      - "-placement-host-address=placement:50005"
      - "-scheduler-host-address=scheduler:50006"
    volumes:
      - type: bind
        source: ${COMPONENTS_PATH}
        target: /components
        read_only: true
    depends_on:
      order:
        condition: service_started

  inventory:
    image: node:25-bookworm-slim
    working_dir: /app
    volumes:
      - type: bind
        source: ${BUNDLE_INVENTORY}
        target: /app
        read_only: true
      - type: bind
        source: ${NODE_MODULES}
        target: /node_modules
        read_only: true
      - type: bind
        source: ${ESM_PKG}
        target: /package.json
        read_only: true
    command: ["node", "main.js"]
    environment:
      APP_PORT: "8080"
      DAPR_HTTP_PORT: "3500"
      DAPR_GRPC_PORT: "50001"
    ports:
      - "8080"
      - "3500"
    networks: [dapr-net]
    depends_on: [redis, placement, scheduler]

  inventory-dapr:
    image: daprio/dapr:1.17.7
    network_mode: "service:inventory"
    command:
      - "./daprd"
      - "-app-id=inventory-service"
      - "-app-port=8080"
      - "-dapr-http-port=3500"
      - "-dapr-grpc-port=50001"
      - "-components-path=/components"
      - "-placement-host-address=placement:50005"
      - "-scheduler-host-address=scheduler:50006"
    volumes:
      - type: bind
        source: ${COMPONENTS_PATH}
        target: /components
        read_only: true
    depends_on:
      inventory:
        condition: service_started

  payment:
    image: node:25-bookworm-slim
    working_dir: /app
    volumes:
      - type: bind
        source: ${BUNDLE_PAYMENT}
        target: /app
        read_only: true
      - type: bind
        source: ${NODE_MODULES}
        target: /node_modules
        read_only: true
      - type: bind
        source: ${ESM_PKG}
        target: /package.json
        read_only: true
    command: ["node", "main.js"]
    environment:
      APP_PORT: "8080"
      DAPR_HTTP_PORT: "3500"
      DAPR_GRPC_PORT: "50001"
    ports:
      - "8080"
      - "3500"
    networks: [dapr-net]
    depends_on: [redis, placement, scheduler]

  payment-dapr:
    image: daprio/dapr:1.17.7
    network_mode: "service:payment"
    command:
      - "./daprd"
      - "-app-id=payment-service"
      - "-app-port=8080"
      - "-dapr-http-port=3500"
      - "-dapr-grpc-port=50001"
      - "-components-path=/components"
      - "-placement-host-address=placement:50005"
      - "-scheduler-host-address=scheduler:50006"
    volumes:
      - type: bind
        source: ${COMPONENTS_PATH}
        target: /components
        read_only: true
    depends_on:
      payment:
        condition: service_started

  shipping:
    image: node:25-bookworm-slim
    working_dir: /app
    volumes:
      - type: bind
        source: ${BUNDLE_SHIPPING}
        target: /app
        read_only: true
      - type: bind
        source: ${NODE_MODULES}
        target: /node_modules
        read_only: true
      - type: bind
        source: ${ESM_PKG}
        target: /package.json
        read_only: true
    command: ["node", "main.js"]
    environment:
      APP_PORT: "8080"
      DAPR_HTTP_PORT: "3500"
      DAPR_GRPC_PORT: "50001"
    ports:
      - "8080"
      - "3500"
    networks: [dapr-net]
    depends_on: [redis, placement, scheduler]

  shipping-dapr:
    image: daprio/dapr:1.17.7
    network_mode: "service:shipping"
    command:
      - "./daprd"
      - "-app-id=shipping-service"
      - "-app-port=8080"
      - "-dapr-http-port=3500"
      - "-dapr-grpc-port=50001"
      - "-components-path=/components"
      - "-placement-host-address=placement:50005"
      - "-scheduler-host-address=scheduler:50006"
    volumes:
      - type: bind
        source: ${COMPONENTS_PATH}
        target: /components
        read_only: true
    depends_on:
      shipping:
        condition: service_started

networks:
  dapr-net:
